<div class="container">
  <h2>Lista de destinos</h2>
  <ul class="list-group">
    <app-destinoviaje *ngFor="let x of destino" [nombre]="x"></app-destinoviaje>
  </ul>

  <div class="mt-3">
    <form (submit)="agregar(nuevoDestino.value); nuevoDestino.value=''; $event.preventDefault()">
  <input #nuevoDestino class="form-control" placeholder="Agregar destino">
  <button class="btn btn-primary mt-2">Agregar</button>
</form>
  </div>
</div>
